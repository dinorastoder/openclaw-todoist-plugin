name: Publish to ClawHub

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, e.g. 2026.4.3"
        required: true
        type: string
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*"

permissions:
  contents: read

concurrency:
  group: clawhub-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version and ClawHub tag
        id: release
        shell: bash
        env:
          TARGET_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${TARGET_TAG}"
          # Strip leading 'v' if present (support both v2026.4.3 and 2026.4.3)
          RAW_VERSION="${TAG#v}"
          CLAWHUB_TAG="latest"

          # Beta releases: any tag containing -beta (e.g. 2026.4.3-beta.1)
          if [[ "$RAW_VERSION" =~ -beta([.\-]|$) ]]; then
            CLAWHUB_TAG="beta"
          fi

          echo "Publishing version ${RAW_VERSION} with ClawHub tag '${CLAWHUB_TAG}'"
          echo "raw_version=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "clawhub_tag=${CLAWHUB_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set package.json version
        env:
          RAW_VERSION: ${{ steps.release.outputs.raw_version }}
        run: |
          set -euo pipefail
          npm version "${RAW_VERSION}" --no-git-tag-version --allow-same-version
          echo "package.json version set to $(node -p "require('./package.json').version")"

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Install ClawHub CLI
        run: npm install --global clawhub@0.9.0

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_CONFIG_PATH: ${{ runner.temp }}/clawhub-config.json
          CLAWHUB_SITE: https://clawhub.ai
          CLAWHUB_REGISTRY: https://clawhub.ai
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CLAWHUB_TOKEN:-}" ]]; then
            echo "::error::CLAWHUB_TOKEN secret is required. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

          clawhub auth login --token "${CLAWHUB_TOKEN}" --no-browser

      - name: Publish to ClawHub
        env:
          CLAWHUB_CONFIG_PATH: ${{ runner.temp }}/clawhub-config.json
          CLAWHUB_SITE: https://clawhub.ai
          CLAWHUB_REGISTRY: https://clawhub.ai
          CLAWHUB_TAGS: ${{ steps.release.outputs.clawhub_tag }}
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          clawhub package publish . \
            --tags "${CLAWHUB_TAGS}" \
            --source-repo "${GITHUB_REPOSITORY}" \
            --source-commit "${GITHUB_SHA}" \
            --source-ref "${SOURCE_REF}" \
            --source-path "."
